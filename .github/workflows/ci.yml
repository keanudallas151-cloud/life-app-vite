name: CI

on:
  push:
    branches:
      - main
      - main_backup
  pull_request:
    branches:
      - main
      - main_backup

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Check for merge conflict markers
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = process.cwd();
            const skipDirs = new Set(['.git', 'node_modules', '.next']);
            const skipFiles = new Set(['package-lock.json', 'yarn.lock', 'pnpm-lock.yaml']);
            const pattern = /^(<<<<<<<|=======|>>>>>>>)/m;
            const hits = [];

            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                if (skipDirs.has(entry.name)) continue;
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(fullPath);
                  continue;
                }
                if (skipFiles.has(entry.name)) continue;
                const content = fs.readFileSync(fullPath, 'utf8');
                if (pattern.test(content)) {
                  hits.push(path.relative(root, fullPath));
                }
              }
            }

            walk(root);

            if (hits.length) {
              core.setFailed(`Merge conflict markers detected in: ${hits.join(', ')}`);
            }

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
