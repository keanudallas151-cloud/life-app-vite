<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover enables safe-area-inset on iPhone notch/Dynamic Island -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Life. — Build Wealth. Learn Everything. Connect.</title>
    <meta
      name="description"
      content="Life. helps you make money, learn anything, and connect with investors and creators. Finance, psychology, philosophy — everything you need to build the life you want."
    />
    <meta name="robots" content="index,follow" />

    <!-- PWA / iOS home-screen integration -->
    <meta
      name="theme-color"
      content="#4a8c5c"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#121212"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Life." />
    <!-- black-translucent lets status bar overlay the app so it looks fully native -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Prevent phone-number detection re-styling links -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS requires a rasterised apple-touch-icon; fall back to SVG if no PNG exists -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- iOS splash screens (portrait, most common sizes) -->
    <link
      rel="apple-touch-startup-image"
      href="/splash-640x1136.png"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash-1242x2208.png"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Life. — Build Wealth. Learn Everything. Connect." />
    <meta
      property="og:description"
      content="Make money, learn anything, and connect with investors and creators. The first million is the hardest — the second is imminent."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Life. — Build Wealth. Learn Everything. Connect." />
    <meta name="twitter:description" content="Make money, learn anything, and connect with investors and creators." />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="/home-hero-polish.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="/home-hero-polish.js" defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
